# General config
spring.main.banner-mode=off
spring.profiles.active=default
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.path=${APP_PATH:/taniwha}
server.port=${PORT:8080}
server.servlet.context-path=/taniwha
spring.mvc.async.request-timeout=300000
server.tomcat.connection-timeout=300000
# Central service location
# Deployment
host.url=${HOST_URL:https://semantics.inf.um.es}
host.service=${HOST_SERVICE:/taniwha-ws}
# Development
# host.url=http://localhost:8092
# host.service=/taniwha
# Node config
node.ip=${NODE_IP:8080}
name=${NAME:unnamed}
desc=${DESC:no description available}
node.color=${COLOR:#FF0000}
heartbeat.interval.ms=60000
retry.backoff.period.ms=2000
retry.max.attempts=3
# Security config
spring.security.user.name=${SPRING_SECURITY_USER_NAME:default}
jwt.secret=${JWT_SECRET:default}
jwt.expiration=10800
# Kerberos config
kerberos.ticket.version=5
kerberos.realm=TANIWHA-REALM
# Logger config
# Note: logging.config is intentionally omitted so that logback-test.xml takes precedence
# during test runs (Logback's standard auto-discovery) while logback.xml is loaded in production.
logging.level.org.taniwha=DEBUG

tls.probe.enabled=true
# tls.probe.host=semantics.inf.um.es
# tls.probe.port=443

# Disclosure control – privacy thresholds for analytics outputs
# Minimum number of records required to return feature statistics (generous default)
disclosure.min.subset.size=${DISCLOSURE_MIN_SUBSET_SIZE:3}
# Minimum cell count for categorical/date histogram buckets (k-anonymity).
# Cells with a count of exactly 1 (a unique individual) are suppressed by default.
disclosure.min.cell.count=${DISCLOSURE_MIN_CELL_COUNT:2}
